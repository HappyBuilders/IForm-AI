<!-- List Page Template -->
<div class="page list-page">
    <!-- Header -->
    <header class="page-header">
        <button class="btn-back" onclick="router.back()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </button>
        <h1 class="page-title">{{list_title}}</h1>
        <button class="btn-add" onclick="router.navigate('/{{entity}}/create')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14"/>
            </svg>
        </button>
    </header>
    
    <!-- Search Bar -->
    <div class="search-bar">
        <div class="search-input-wrapper">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="search" 
                   class="search-input" 
                   placeholder="搜索..."
                   id="search-input"
                   oninput="listView.handleSearch(this.value)">
            <button class="btn-clear hidden" id="btn-clear-search" onclick="listView.clearSearch()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6 6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <button class="btn-filter" onclick="listView.toggleFilter()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
            </svg>
            <span>筛选</span>
        </button>
    </div>
    
    <!-- Filter Panel (Hidden by default) -->
    <div class="filter-panel hidden" id="filter-panel">
        {{filter_fields}}
        <div class="filter-actions">
            <button class="btn-secondary" onclick="listView.resetFilters()">重置</button>
            <button class="btn-primary" onclick="listView.applyFilters()">确定</button>
        </div>
    </div>
    
    <!-- List Container -->
    <div class="list-container" id="list-container">
        <!-- Pull to refresh indicator -->
        <div class="pull-refresh-indicator hidden" id="pull-refresh">
            <div class="spinner-small"></div>
            <span>下拉刷新</span>
        </div>
        
        <!-- List items will be rendered here -->
        <div class="list-content" id="list-content"></div>
        
        <!-- Loading skeleton (shown during initial load) -->
        <div class="skeleton-list" id="skeleton-list">
            <div class="skeleton-item"></div>
            <div class="skeleton-item"></div>
            <div class="skeleton-item"></div>
            <div class="skeleton-item"></div>
            <div class="skeleton-item"></div>
        </div>
        
        <!-- Empty state -->
        <div class="empty-state hidden" id="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
            </svg>
            <p>暂无数据</p>
            <button class="btn-secondary" onclick="listView.refresh()">刷新</button>
        </div>
        
        <!-- Load more indicator -->
        <div class="load-more hidden" id="load-more">
            <div class="spinner-small"></div>
            <span>加载中...</span>
        </div>
        
        <!-- No more data -->
        <div class="no-more hidden" id="no-more">
            <span>没有更多数据了</span>
        </div>
    </div>
</div>

<script>
// List View Component
const listView = {
    entity: '{{entity}}',
    page: 1,
    pageSize: 20,
    total: 0,
    keyword: '',
    filters: {},
    isLoading: false,
    hasMore: true,
    
    async init() {
        this.setupPullToRefresh();
        this.setupInfiniteScroll();
        await this.loadData();
    },
    
    async loadData(refresh = false) {
        if (this.isLoading) return;
        
        this.isLoading = true;
        
        if (refresh) {
            this.page = 1;
            this.hasMore = true;
            document.getElementById('skeleton-list').classList.remove('hidden');
            document.getElementById('list-content').innerHTML = '';
        }
        
        try {
            const result = await api.get(`/${this.entity}/list`, {
                page: this.page,
                pageSize: this.pageSize,
                keyword: this.keyword,
                ...this.filters
            });
            
            if (result.success) {
                this.total = result.data.total;
                this.renderItems(result.data.list, refresh);
                this.hasMore = result.data.list.length === this.pageSize;
                
                // Update empty state
                const hasData = this.total > 0 || document.getElementById('list-content').children.length > 0;
                document.getElementById('empty-state').classList.toggle('hidden', hasData);
            }
        } catch (error) {
            toast.error('加载失败，请重试');
        } finally {
            this.isLoading = false;
            document.getElementById('skeleton-list').classList.add('hidden');
            document.getElementById('load-more').classList.add('hidden');
            document.getElementById('pull-refresh').classList.add('hidden');
            
            if (!this.hasMore && this.total > this.pageSize) {
                document.getElementById('no-more').classList.remove('hidden');
            }
        }
    },
    
    renderItems(items, append = false) {
        const container = document.getElementById('list-content');
        const html = items.map(item => this.renderItem(item)).join('');
        
        if (append) {
            container.innerHTML += html;
        } else {
            container.innerHTML = html;
        }
    },
    
    renderItem(item) {
        // Override this method for custom item rendering
        return `
            <div class="list-item" onclick="router.navigate('/${this.entity}/detail/${item.id}')">
                <div class="item-content">
                    <h3 class="item-title">${item.name || item.title || '未命名'}</h3>
                    <p class="item-desc">${item.description || ''}</p>
                    <div class="item-meta">
                        <span class="item-time">${formatDate(item.created_at)}</span>
                        <span class="item-status status-${item.status}">${item.status}</span>
                    </div>
                </div>
                <svg class="item-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </div>
        `;
    },
    
    handleSearch(keyword) {
        this.keyword = keyword;
        document.getElementById('btn-clear-search').classList.toggle('hidden', !keyword);
        
        // Debounce search
        clearTimeout(this.searchTimer);
        this.searchTimer = setTimeout(() => {
            this.loadData(true);
        }, 300);
    },
    
    clearSearch() {
        document.get
