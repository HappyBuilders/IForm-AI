<!-- Form Page Template -->
<div class="page form-page">
    <!-- Header -->
    <header class="page-header">
        <button class="btn-back" onclick="router.back()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </button>
        <h1 class="page-title">{{form_title}}</h1>
        <button class="btn-save" onclick="formView.save()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
            </svg>
        </button>
    </header>
    
    <!-- Form Content -->
    <div class="page-content">
        <form id="main-form" class="form-container" onsubmit="return false;">
            {{form_fields}}
        </form>
    </div>
    
    <!-- Bottom Action -->
    <div class="bottom-action">
        <button type="button" class="btn-primary btn-block" onclick="formView.save()">
            {{submit_button_text}}
        </button>
    </div>
</div>

<script>
// Form View Component
const formView = {
    entity: '{{entity}}',
    id: null,
    isEdit: false,
    originalData: null,
    
    async init() {
        this.id = router.currentRoute?.params?.id;
        this.isEdit = !!this.id;
        
        if (this.isEdit) {
            await this.loadData();
        }
        
        this.setupValidation();
    },
    
    async loadData() {
        loading.show();
        
        try {
            const result = await api.get(`/${this.entity}/detail/${this.id}`);
            
            if (result.success) {
                this.originalData = result.data;
                this.populateForm(result.data);
            } else {
                toast.error('加载数据失败');
            }
        } catch (error) {
            toast.error('加载数据失败，请重试');
        } finally {
            loading.hide();
        }
    },
    
    populateForm(data) {
        const form = document.getElementById('main-form');
        if (!form) return;
        
        Object.entries(data).forEach(([key, value]) => {
            const field = form.querySelector(`[name="${key}"]`);
            if (field) {
                if (field.type === 'checkbox') {
                    field.checked = !!value;
                } else if (field.type === 'radio') {
                    const radio = form.querySelector(`[name="${key}"][value="${value}"]`);
                    if (radio) radio.checked = true;
                } else {
                    field.value = value || '';
                }
            }
        });
    },
    
    collectFormData() {
        const form = document.getElementById('main-form');
        if (!form) return {};
        
        const formData = new FormData(form);
        const data = {};
        
        formData.forEach((value, key) => {
            const field = form.querySelector(`[name="${key}"]`);
            
            if (field?.type === 'checkbox') {
                data[key] = field.checked;
            } else if (field?.type === 'number') {
                data[key] = value ? parseFloat(value) : null;
            } else {
                data[key] = value;
            }
        });
        
        // Handle checkboxes that are unchecked (not in FormData)
        form.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            if (!formData.has(checkbox.name)) {
                data[checkbox.name] = false;
            }
        });
        
        return data;
    },
    
    setupValidation() {
        const form = document.getElementById('main-form');
        if (!form) return;
        
        // Real-time validation
        form.querySelectorAll('[data-validate]').forEach(field => {
            field.addEventListener('blur', () => this.validateField(field));
            field.addEventListener('input', () => this.clearFieldError(field));
        });
    },
    
    validateField(field) {
        const rules = field.dataset.validate?.split(',') || [];
        const value = field.value.trim();
        let error = null;
        
        if (rules.includes('required') && !value) {
            error = '此项为必填项';
        } else if (rules.includes('email') && value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
            error = '请输入有效的邮箱地址';
        } else if (rules.includes('phone') && value && !/^1[3-9]\d{9}$/.test(value)) {
            error = '请输入有效的手机号码';
        } else if (field.minLength && value.length < field.minLength) {
            error = `至少需要 ${field.minLength} 个字符`;
        } else if (field.maxLength && value.length > field.maxLength) {
            error = `最多 ${field.maxLength} 个字符`;
        }
        
        if (error) {
            this.showFieldError(field, error);
            return false;
        }
        
        this.clearFieldError(field);
        return true;
    },
    
    showFieldError(field, message) {
        field.classList.add('error');
        
        let errorEl = field.parentElement.querySelector('.field-error');
        if (!errorEl) {
            errorEl = document.createElement('div');
            errorEl.className = 'field-error';
            field.parentElement.appendChild(errorEl);
        }
        
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
    },
    
    clearFieldError(field) {
        field.classList.remove('error');
        const errorEl = field.parentElement.querySelector('.field-error');
        if (errorEl) {
            errorEl.classList.add('hidden');
        }
    },
    
    validateForm() {
        const form = document.getElementById('main-form');
        if (!form) return false;
        
        let isValid = true;
        
        form.querySelectorAll('[data-validate]').forEach(field => {
            if (!this.validateField(field)) {
                isValid = false;
            }
        });
        
        return isValid;
    },
    
    async save() {
        if (!this.validateForm()) {
            toast.error('请检查表单填写是否正确');
            return;
        }
        
        const data = this.collectFormData();
        
        // Confirm if editing
        if (this.isEdit && this.hasChanges(data)) {
            modal.confirm('确定要保存修改吗？', async () => {
                await this.submit(data);
            });
        } else {
            await this.submit(data);
        }
    },
    
    hasChanges(newData) {
        if (!this.originalData) return true;
        
        return Object.keys(newData).some(key => {
            return newData[key] !== this.originalData[key];
        });
    },
    
    async submit(data) {
        loading.show();
        
        try {
            const endpoint = this.isEdit 
                ? `/${this.entity}/update/${this.id}` 
                : `/${this.entity}/create`;
            
            const method = this.isEdit ? 'PUT' : 'POST';
            const result = await api.request(method, endpoint, data);
            
            if (result.success) {
                toast.success(this.isEdit ? '保存成功' : '创建成功');
                
                // Go back after short delay
                setTimeout(() => {
                    router.back();
                }, 500);
            } else {
                toast.error(result.error?.message || '操作失败');
            }
        } catch (error) {
            toast.error('操作失败，请重试');
        } finally {
            loading.hide();
        }
    },
};
